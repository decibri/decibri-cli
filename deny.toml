[advisories]
version = 2
yanked = "deny"
ignore = [
    # number_prefix 0.4.0 is unmaintained but NOT vulnerable. Transitively
    # required by indicatif for progress-bar file-size formatting. Revisit
    # when indicatif upstream swaps to `unit-prefix`.
    { id = "RUSTSEC-2025-0119", reason = "number_prefix unmaintained; no security impact; transitive via indicatif" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
