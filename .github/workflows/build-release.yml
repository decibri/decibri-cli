name: Build Release

# Single release pipeline, triggered by pushing a v* tag (e.g., v0.2.0,
# v0.2.0-rc.1). On a tag push: preflight asserts the tag matches both
# manifests, the matrix builds all targets, the GitHub Release is published
# with all binaries, then crates.io and npm publishes each wait for manual
# approval behind their protected environments (crates, npm).
# Manual dispatch is a build-only dry run: preflight, build, universal2,
# and verify-pack run; no Release is created and nothing is published.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # softprops/action-gh-release creates/updates the Release
  id-token: write        # OIDC for attest-build-provenance, crates.io, and npm trusted publishing
  attestations: write    # actions/attest-build-provenance writes the attestation

jobs:
  preflight:
    name: Preflight (version match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::notice::DRY RUN MODE (workflow_dispatch). Build and verify only; no Release, no publish."
          else
            echo "Publishing run. Tag: ${{ github.ref_name }}"
          fi

      - name: Assert tag version matches manifests
        if: github.event_name == 'push'
        shell: bash
        run: |
          # Tag form: refs/tags/v0.2.0 -> TAG_VERSION=0.2.0. Pre-release
          # tags (v0.2.0-rc.1) are allowed; the suffix must match both
          # manifests. jq is preinstalled on ubuntu-latest runners.
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' Cargo.toml | head -1)
          if [ -z "$CARGO_VERSION" ]; then
            echo "ERROR: could not extract version from Cargo.toml"
            exit 1
          fi
          PKG_VERSION=$(jq -r .version npm/decibri-cli/package.json)
          echo "tag=${TAG_VERSION} cargo=${CARGO_VERSION} npm=${PKG_VERSION}"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ] || [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: version mismatch. Bump Cargo.toml and npm/decibri-cli/package.json to ${TAG_VERSION}, then re-tag."
            exit 1
          fi
          echo "OK: tag, Cargo.toml, and package.json all agree on ${TAG_VERSION}"

  build:
    name: Build (${{ matrix.target }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            ext: ''
          - target: aarch64-apple-darwin
            os: macos-14
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"

      - name: Install ALSA (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # Full multiarch setup for aarch64 cross-compile with ALSA.
      # Explicit because setup-cross-toolchain-action installs the cross gcc
      # but does NOT configure arm64 package sources, so libasound2-dev:arm64
      # is unavailable after it runs. Sequence:
      #  1. Enable arm64 architecture
      #  2. Restrict default amd64 mirror to amd64 only (both DEB822 and legacy
      #     sources.list handled; Ubuntu runner images vary)
      #  3. Add a ports.ubuntu.com mirror for arm64 packages
      #  4. apt-get update, install the arm64 ALSA dev headers and the cross gcc
      #  5. Export linker + pkg-config env for cargo
      - name: Set up aarch64-linux cross-compile
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euxo pipefail
          CODENAME=$(lsb_release -cs)
          sudo dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types: deb$/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|^deb |deb [arch=amd64] |g' /etc/apt/sources.list
          fi
          {
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $CODENAME main restricted universe multiverse"
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $CODENAME-updates main restricted universe multiverse"
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $CODENAME-security main restricted universe multiverse"
          } | sudo tee /etc/apt/sources.list.d/arm64.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libasound2-dev:arm64
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
          echo 'PKG_CONFIG_ALLOW_CROSS=1' >> "$GITHUB_ENV"
          echo 'PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig' >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/decibri${{ matrix.ext }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location target/${{ matrix.target }}/release
          7z a decibri-${{ matrix.target }}.zip decibri.exe

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf decibri-${{ matrix.target }}.tar.gz decibri

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/decibri-${{ matrix.target }}.zip
            target/${{ matrix.target }}/release/decibri-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  universal2:
    name: macOS universal2
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Download x86_64-apple-darwin artifact
        uses: actions/download-artifact@v8
        with:
          name: binary-x86_64-apple-darwin
          path: artifacts/x86_64

      - name: Download aarch64-apple-darwin artifact
        uses: actions/download-artifact@v8
        with:
          name: binary-aarch64-apple-darwin
          path: artifacts/aarch64

      - name: Lipo-merge into universal2 binary
        run: |
          mkdir -p merge/x86_64 merge/aarch64 merge/universal2
          tar xzf artifacts/x86_64/decibri-x86_64-apple-darwin.tar.gz -C merge/x86_64
          tar xzf artifacts/aarch64/decibri-aarch64-apple-darwin.tar.gz -C merge/aarch64
          lipo -create \
            merge/x86_64/decibri \
            merge/aarch64/decibri \
            -output merge/universal2/decibri
          file merge/universal2/decibri
          lipo -info merge/universal2/decibri
          cd merge/universal2
          tar czf decibri-universal2-apple-darwin.tar.gz decibri

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: merge/universal2/decibri

      - uses: actions/upload-artifact@v7
        with:
          name: binary-universal2-apple-darwin
          path: merge/universal2/decibri-universal2-apple-darwin.tar.gz
          if-no-files-found: error
          retention-days: 7

  verify-pack:
    name: Verify npm pack contents
    needs: preflight
    # Runs on both tag pushes and dispatch dry runs. publish-npm requires
    # this job, so a bad pack list blocks the npm publish.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Verify npm package contents (pre-publish gate)
        shell: bash
        run: |
          set -o pipefail
          cd npm/decibri-cli
          files=$(npm pack --dry-run --json | jq -r '.[0].files[].path')
          echo "Would pack:"
          echo "$files" | sort | sed 's/^/  * /'
          FAIL=0
          # Required: the manifest, both lifecycle scripts, the bin shim,
          # README, and LICENSE. This is the package.json `files` allowlist,
          # and everything a working install needs.
          for f in package.json install.js uninstall.js bin/decibri README.md LICENSE; do
            if echo "$files" | grep -Fxq "$f"; then
              echo "  [OK]   required present: $f"
            else
              echo "  [FAIL] required MISSING: $f"
              FAIL=1
            fi
          done
          # Forbidden: any binary artifact. install.js downloads the binary
          # from the GitHub Release at install time; nothing binary ships in
          # the package. decibri-bin is the downloaded binary's basename
          # (extensionless on Unix, so the extension patterns miss it).
          for p in '\.node$' '\.exe$' '\.zip$' '\.tar\.gz$' 'decibri-bin'; do
            matches=$(echo "$files" | grep -E "$p" || true)
            if [ -n "$matches" ]; then
              echo "  [FAIL] forbidden pattern '$p' matched:"
              echo "$matches" | sed 's/^/         /'
              FAIL=1
            else
              echo "  [OK]   forbidden absent: $p"
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "VERIFICATION FAILED: not publish-ready"
            exit 1
          fi
          echo "OK verify-pack: package contents are publish-ready"

  release:
    name: Create GitHub Release
    needs: [build, universal2]
    # Only tag pushes create a Release; workflow_dispatch is a build-only
    # dry run. The Release is published immediately (not draft) because the
    # npm wrapper's install.js downloads binaries from the live Release,
    # and the publish-npm job depends on those assets being up.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd artifacts
          # Sort deterministically by filename so the SHA256SUMS file is
          # reproducible across re-runs. Format: "<hex>  <filename>" (two
          # spaces, the GNU sha256sum convention).
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -printf '%f\n' \
            | sort \
            | xargs -I {} sha256sum {} \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/decibri-*.tar.gz
            artifacts/decibri-*.zip
            artifacts/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-crate:
    name: Publish to crates.io
    needs: preflight
    # Tag pushes only; workflow_dispatch is a build-only dry run.
    if: github.event_name == 'push'
    # Required-reviewer protection on this environment gates the publish
    # behind a manual approval in the Actions UI.
    environment: crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Install ALSA headers
        # `cargo publish` runs a verify build of the packaged crate. The
        # `cpal` transitive dep links ALSA on Linux.
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Authenticate to crates.io
        # Exchanges a GitHub OIDC token for a short-lived crates.io publish
        # token, consumed by the next step's CARGO_REGISTRY_TOKEN env var.
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

  publish-npm:
    name: Publish to npm
    # The wrapper's install.js downloads binaries from the GitHub Release,
    # so the Release (with all assets) must be live before the npm publish,
    # and verify-pack must have passed on this same commit.
    needs: [release, verify-pack]
    # Tag pushes only; workflow_dispatch is a build-only dry run.
    if: github.event_name == 'push'
    # Required-reviewer protection on this environment gates the publish
    # behind a manual approval in the Actions UI.
    environment: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish decibri-cli
        # npm Trusted Publishing (OIDC) supplies auth automatically given
        # `id-token: write` and the registered trusted publisher record.
        # No NODE_AUTH_TOKEN is used.
        run: cd npm/decibri-cli && npm publish --access public

      - name: Verify npm publish
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Verifying npm registry view for decibri-cli@${VERSION}"
          sleep 30
          npm view "decibri-cli@${VERSION}"
